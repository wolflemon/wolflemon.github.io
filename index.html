<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的工具箱 | Wolflemon's Tools</title>
    <style>
    :root {
        --bg-color: #0d1117;          /* 极客深灰 */
        --card-bg: #161b22;          /* 卡片背景 */
        --text-main: #c9d1d9;         /* 文字颜色 */
        --accent: #58a6ff;           /* 极客蓝 */
        --highlight: #3fb950;        /* 终端绿 */
    }

    body { 
        font-family: 'Courier New', Courier, monospace; /* 强制等宽字体，增加极客感 */
        background-color: var(--bg-color); 
        color: var(--text-main);
        padding: 40px 20px; 
        margin: 0; 
        display: flex; flex-direction: column; align-items: center; 
    }

    h1 { color: var(--highlight); margin-bottom: 40px; border-bottom: 2px solid var(--highlight); padding-bottom: 10px; }
    h1::before { content: "> "; } /* 增加终端命令提示符感 */

    .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 900px; }

    .card { 
        background: var(--card-bg); 
        padding: 25px; 
        border: 1px solid #30363d; /* 精细边框 */
        border-radius: 4px; 
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
        text-decoration: none; 
        color: var(--text-main);
        position: relative;
        overflow: hidden;
    }

    /* 鼠标悬停时的极客辉光效果 */
    .card:hover { 
        border-color: var(--accent);
        box-shadow: 0 0 15px rgba(88, 166, 255, 0.2);
    }

    .card h2 { margin-top: 0; color: var(--accent); font-size: 1.1rem; }
    .card p { color: #8b949e; font-size: 0.85rem; line-height: 1.6; }
    
    /* 装饰性元素：像代码块一样的边角 */
    .card::after {
        content: "/* READ */";
        position: absolute; right: 10px; bottom: 5px;
        font-size: 0.6rem; color: #30363d;
    }

    footer { margin-top: 60px; color: #484f58; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <h1>🚀 个人效率工具箱</h1>

    <div class="grid-container">
        <a href="text-cleaner/index.html" class="card">
            <h2>✨ 文本清洗与格式化</h2>
            <p>支持 Markdown 加粗、自动识别标题、去除多余空格及精准控制换行。专为提升 Word 文档排版效率打造。</p>
        </a>

        <a href="#" class="card" style="opacity: 0.6; cursor: not-allowed;">
            <h2>🛠️ 待开发工具</h2>
            <p>更多高效工具正在规划中，敬请期待...</p>
        </a>
    </div>

    <footer>Build by Wolflemon & Gemini | GitHub Pages</footer>

</body>
</html>
